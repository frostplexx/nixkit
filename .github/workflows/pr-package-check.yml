name: PR Package Check

on:
  pull_request:
    paths:
      - "packages/**/default.nix"

permissions:
  contents: read

jobs:
  dry-run:
    runs-on: macos-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@v22

      - name: Setup Nix Magic Cache
        uses: DeterminateSystems/magic-nix-cache-action@v13

      - name: Install dependencies
        run: |
          nix profile add nixpkgs#nix-update
          nix profile add nixpkgs#python3

      - name: Detect changed packages
        id: packages
        run: |
          pkgs=$(git diff --name-only origin/${{ github.base_ref }}...HEAD \
            | grep '^packages/.*/default\.nix$' \
            | sed 's|packages/\([^/]*\)/default\.nix|\1|' \
            | tr '\n' ' ' \
            | xargs)
          echo "list=$pkgs" >> "$GITHUB_OUTPUT"
          echo "Changed packages: $pkgs"

      - name: Dry-run update check
        if: steps.packages.outputs.list != ''
        run: |
          for pkg in ${{ steps.packages.outputs.list }}; do
            ./scripts/update.py -p "$pkg" --dry-run
          done
