name: PR Package Check

on:
  pull_request:

permissions:
  contents: read

jobs:
  detect:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.detect.outputs.matrix }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Detect changed packages and platforms
        id: detect
        env:
          GITHUB_BASE_REF: ${{ github.base_ref }}
        run: |
          python3 << 'EOF'
          import json, os, re, subprocess

          diff = subprocess.check_output(
              ['git', 'diff', '--name-only', f'origin/{os.environ["GITHUB_BASE_REF"]}...HEAD']
          ).decode()

          macos_pkgs, linux_pkgs = [], []
          for line in diff.splitlines():
              m = re.match(r'^packages/([^/]+)/default\.nix$', line)
              if not m:
                  continue
              pkg = m.group(1)
              try:
                  content = open(f'packages/{pkg}/default.nix').read()
              except FileNotFoundError:
                  continue
              # Skip packages without an updateScript (same logic as update.py)
              if 'passthru.updateScript' not in content:
                  continue
              # platforms.linux without darwin/unix → Linux-only runner
              if re.search(r'platforms\.linux', content) and not re.search(r'platforms\.(darwin|unix)', content):
                  linux_pkgs.append(pkg)
              else:
                  macos_pkgs.append(pkg)

          matrix = {"include": []}
          if macos_pkgs:
              matrix["include"].append({"runner": "macos-latest", "packages": " ".join(macos_pkgs)})
          if linux_pkgs:
              matrix["include"].append({"runner": "ubuntu-latest", "packages": " ".join(linux_pkgs)})
          # No packages changed: inject a no-op entry so the matrix job always
          # runs and the required "dry-run" status check is always reported.
          if not matrix["include"]:
              matrix["include"].append({"runner": "ubuntu-latest", "packages": ""})

          with open(os.environ['GITHUB_OUTPUT'], 'a') as f:
              f.write(f"matrix={json.dumps(matrix)}\n")
          EOF

  check:
    needs: detect
    runs-on: ${{ matrix.runner }}
    strategy:
      matrix: ${{ fromJson(needs.detect.outputs.matrix) }}
      fail-fast: false
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: DeterminateSystems/nix-installer-action@v22
        if: matrix.packages != ''

      - uses: DeterminateSystems/magic-nix-cache-action@v13
        if: matrix.packages != ''

      - name: Install dependencies
        if: matrix.packages != ''
        run: |
          nix profile add nixpkgs#nix-update
          nix profile add nixpkgs#python3

      - name: Dry-run update check
        if: matrix.packages != ''
        run: |
          args=$(printf -- '-p %s ' ${{ matrix.packages }})
          ./scripts/update.py $args --dry-run

  # Fixed-name job so the required status check "dry-run" always exists.
  # check always runs (matrix always has ≥1 entry), so this job always runs too.
  dry-run:
    runs-on: ubuntu-latest
    needs: [detect, check]
    if: always()
    steps:
      - name: Report status
        run: |
          result="${{ needs.check.result }}"
          if [[ "$result" == "failure" || "$result" == "cancelled" ]]; then
            exit 1
          fi
