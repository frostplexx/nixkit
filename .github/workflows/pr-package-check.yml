name: PR Package Check

on:
  pull_request:

permissions:
  contents: read

jobs:
  detect:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.detect.outputs.matrix }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@v22

      - name: Detect changed packages and platforms
        id: detect
        env:
          GITHUB_BASE_REF: ${{ github.base_ref }}
        run: |
          python3 << 'EOF'
          import json, os, subprocess

          diff = subprocess.check_output(
              ['git', 'diff', '--name-only', f'origin/{os.environ["GITHUB_BASE_REF"]}...HEAD']
          ).decode()

          changed_packages = set()
          for line in diff.splitlines():
              parts = line.split('/')
              if len(parts) >= 2 and parts[0] == 'packages':
                  changed_packages.add(parts[1])

          if not changed_packages:
              matrix = {"include": [{"runner": "ubuntu-latest", "os": "linux", "packages": ""}]}
              with open(os.environ['GITHUB_OUTPUT'], 'a') as f:
                  f.write(f"matrix={json.dumps(matrix)}\n")
              exit(0)

          # Find packages with updateScript (check on aarch64-darwin since all packages are defined there)
          updatable = set()
          for pkg in changed_packages:
              result = subprocess.run(
                  ['nix', 'eval', '--json', f'.#packages.aarch64-darwin.{pkg}.passthru.updateScript'],
                  capture_output=True
              )
              if result.returncode == 0:
                  updatable.add(pkg)

          if not updatable:
              matrix = {"include": [{"runner": "ubuntu-latest", "os": "linux", "packages": ""}]}
              with open(os.environ['GITHUB_OUTPUT'], 'a') as f:
                  f.write(f"matrix={json.dumps(matrix)}\n")
              exit(0)

          # Get all packages per system (no full evaluation)
          all_packages = json.loads(subprocess.check_output(
              ['nix', 'eval', '--json', '.#packages', '--apply', 
               'builtins.mapAttrs (system: pkgs: builtins.attrNames pkgs)']
          ).decode())

          matrix = {"include": []}
          for system_key, packages in all_packages.items():
              if system_key not in ("aarch64-darwin", "x86_64-darwin", "aarch64-linux", "x86_64-linux"):
                  continue

              os_name = "linux" if "linux" in system_key else "darwin"
              runner = "ubuntu-latest" if "linux" in system_key else "macos-latest"

              system_packages = [pkg for pkg in packages if pkg in updatable]
              
              if system_packages:
                  matrix["include"].append({
                      "runner": runner,
                      "os": os_name,
                      "packages": " ".join(system_packages)
                  })

          if not matrix["include"]:
              matrix["include"].append({"runner": "ubuntu-latest", "os": "linux", "packages": ""})

          with open(os.environ['GITHUB_OUTPUT'], 'a') as f:
              f.write(f"matrix={json.dumps(matrix)}\n")
          EOF

  check:
    needs: detect
    runs-on: ${{ matrix.runner }}
    strategy:
      matrix: ${{ fromJson(needs.detect.outputs.matrix) }}
      fail-fast: false
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: DeterminateSystems/nix-installer-action@v22
        if: matrix.packages != ''

      - uses: DeterminateSystems/magic-nix-cache-action@v13
        if: matrix.packages != ''

      - name: Install dependencies
        if: matrix.packages != ''
        run: |
          nix profile add nixpkgs#nix-update
          nix profile add nixpkgs#python3

      - name: Dry-run update check
        if: matrix.packages != ''
        run: |
          ./scripts/update.py --os ${{ matrix.os }} --packages ${{ matrix.packages }} --dry-run

  # Fixed-name job so the required status check "dry-run" always exists.
  # check always runs (matrix always has ≥1 entry), so this job always runs too.
  dry-run:
    runs-on: ubuntu-latest
    needs: [detect, check]
    if: always()
    steps:
      - name: Report status
        run: |
          result="${{ needs.check.result }}"
          if [[ "$result" == "failure" || "$result" == "cancelled" ]]; then
            exit 1
          fi
