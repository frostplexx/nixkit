name: Daily Package Updates

on:
  push:
    branches:
      - main
  schedule:
    - cron: "0 6 * * *"
  workflow_dispatch:

env:
  TZ: Europe/Berlin
permissions:
  contents: write
  pull-requests: write

jobs:
  discover:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.discover.outputs.matrix }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@v22

      - name: Discover packages and platforms
        id: discover
        run: |
          # Get all package names per system (no evaluation)
          all_packages=$(nix eval --json '.#packages' --apply 'builtins.mapAttrs (system: pkgs: builtins.attrNames pkgs)')

          # Check for updateScript on aarch64-darwin (all packages are defined there)
          packages=$(echo "$all_packages" | jq -r '.["aarch64-darwin"][]')

          updatable=""
          for pkg in $packages; do
            if nix eval --json ".#packages.aarch64-darwin.$pkg.passthru.updateScript" 2>/dev/null >/dev/null; then
              updatable="$updatable $pkg"
            fi
          done
          updatable=$(echo $updatable | xargs)  # trim whitespace

          # Build matrix from package list, filtered by updatable packages
          matrix=$(echo "$all_packages" | jq -c --arg updatable "$updatable" '
            ($updatable | split(" ")) as $upd_list |
            to_entries
            | map(select(.key | . == "aarch64-darwin" or . == "x86_64-darwin" or . == "aarch64-linux" or . == "x86_64-linux"))
            | map({
                os: (.key | if contains("linux") then "linux" else "darwin" end),
                runner: (.key | if contains("linux") then "ubuntu-latest" else "macos-latest" end),
                system: .key,
                packages: (.value | map(select(. as $pkg | $upd_list | index($pkg))))
              })
            | map(select(.packages | length > 0))
            | {include: .}
          ')

          echo "matrix=$matrix" >> $GITHUB_OUTPUT

  update-packages:
    needs: discover
    strategy:
      matrix: ${{ fromJson(needs.discover.outputs.matrix) }}
      fail-fast: false
    runs-on: ${{ matrix.runner }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@v22

      - name: Setup Nix Magic Cache
        uses: DeterminateSystems/magic-nix-cache-action@v13

      - name: Install dependencies
        run: |
          nix profile add nixpkgs#nix-update
          nix profile add nixpkgs#python3
          nix profile add nixpkgs#gh

      - name: Configure Git
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

      - name: Run package updates
        run: |
          ./scripts/update.py --os ${{ matrix.os }} --packages ${{ join(matrix.packages, ' ') }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
